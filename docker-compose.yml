version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Pass VITE_ variables from the environment to the Docker build process
        - VITE_GITHUB_CLIENT_ID=${VITE_GITHUB_CLIENT_ID}
        - VITE_API_BASE=${VITE_API_BASE}
    image: soroban-studio-frontend:latest
    container_name: soroban-studio-web
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - soroban-network
    # Optionally depends on backend if you want to run them together
    # depends_on:
    #   - backend

networks:
  soroban-network:
    driver: bridge
